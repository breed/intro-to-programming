# Lecture 1

## Introduction to C++

### *Starting C++* --- Chapter 1

# Learning Objectives

By the end of this lecture you should be able to:

- Write, compile, and run a `Hello, World!` program in C++
- Explain the role of `#include`, `main()`, semicolons, and curly braces
- Use `std::cout` to write output and `std::cin` to read input
- Describe what a namespace is and why `std::` shows up everywhere
- Read command-line arguments via `argc` and `argv`, and write a USAGE message

# Welcome to the Course

- Lectures map to chapters: **lecture N -- chapter N**

  - office hours

# Why C++?

- C++ is a **compiled** language --- source code is translated by a compiler into a runnable program
- Used for games, browsers, operating systems, embedded devices, finance, scientific computing
- Tradeoff: more control over the machine, more responsibility for the programmer
- Today we get the *tiniest* taste --- we will spend the entire term going deeper

---

# Hello, World!

.cols[
.lc[
```cpp
#include <iostream>

int main()
{
    std::cout << "Hello, World!"
              << std::endl;
    return 0;
}
```
]
.rc[
- `#include <iostream>` pulls in the I/O library
- `int main()` --- the entry point of every C++ program
- `std::cout << ...` sends text to standard output
- `<<` is the **stream insertion** operator
- `std::endl` ends the line and flushes the buffer
- `return 0;` --- `0` means success
]
]

---

# A Few More Notes

- `<<` can be chained:

```cpp
std::cout << a << b << c;
```

- `"\n"` is a faster alternative to `std::endl` when you do not need to flush the buffer
- The program runs top-to-bottom inside `main()`

---

# Compiling and Running

.cols[
.lc[
Save as `hello.cpp` then:

```
c++ -o hello hello.cpp
./hello
```

With warnings turned on:

```
c++ -Wall -Wextra -pedantic \
    -o hello hello.cpp
```
]
.rc[
- The compiler turns source into an **executable**
- `-o hello` names the output --- without it you get `a.out`
- **Always** compile with warnings on --- the compiler is your friend
- `-Wall -Wextra -pedantic` catches most beginner mistakes
]
]

---

# What Does a Compiler Error Look Like?

Drop the `;` after `std::endl`:

```cpp
std::cout << "Hello, World!" << std::endl
return 0;
```

The compiler complains:

```
hello.cpp:5:5: error: expected ';' before 'return'
    5 |     return 0;
      |     ^~~~~~
```

.callout[
**Tip:** When you see a confusing error, read the message, check the line *above* the one reported, look for a missing `;` or `}`.
]

---

# Semicolons and Curly Braces

- Every **statement** ends with `;`
- `{` and `}` define a **block** of code
- They always come in pairs --- if you open one, you must close it
- Indent everything inside a block (**4 spaces** is standard)
- Forgetting a `;` or `}` is the **most common** beginner mistake

---

# Namespaces and `std::`

- The C++ standard library groups names inside the `std` namespace
- `std::cout` means "the `cout` that lives in `std`"
- `::` is the **scope resolution** operator
- Optional shortcut --- `using namespace std;` --- but avoid it in real code

---

# Explicit vs Shortcut

.cols[
.lc[
**Explicit (preferred):**

```cpp
#include <iostream>

int main() {
    std::cout << "explicit"
              << std::endl;
}
```
]
.rc[
**Shortcut (avoid):**

```cpp
#include <iostream>
using namespace std;

int main() {
    cout << "shortcut"
         << endl;
}
```
]
]

For the rest of the course we write `std::` explicitly so we always know where names come from.

---

# Output with `std::cout`

.cols[
.lc[
```cpp
#include <iostream>

int main()
{
    std::cout << "Come as you are"
              << ", "
              << "as you were"
              << std::endl;
    std::cout << "The year is "
              << 1991 << std::endl;
    return 0;
}
```
]
.rc[
- The order of `<<` is **left-to-right**, just like reading
- Strings, numbers, and variables all chain together
- Anything without a newline stays on the current line
- `std::endl` starts a fresh line
]
]

---

# Input with `std::cin`

.cols[
.lc[
```cpp
#include <iostream>
#include <string>

int main()
{
    std::string name;

    std::cout << "What is your name? ";
    std::cin >> name;
    std::cout << "Hola, " << name
              << "!" << std::endl;
    return 0;
}
```
]
.rc[
- `std::cin` is the standard input stream
- `>>` is the **stream extraction** operator
- `#include <string>` is required for `std::string`
- `std::cin >> name` reads **one word** --- it stops at whitespace
]
]

---

# Reading Whole Lines

.cols[
.lc[
```cpp
std::string name;
std::getline(std::cin, name);
```

Reading a number works the same way:

```cpp
int year;
std::cout << "What year? ";
std::cin >> year;
```
]
.rc[
.callout[
**Trap:** If the user types `Los Del Rio`, `std::cin >> name` only stores `Los`.

Use `std::getline` when you want the **whole** line.
]
]
]

---

# Command-Line Arguments

.cols[
.lc[
```cpp
#include <iostream>

int main(int argc, char *argv[])
{
    if (argc < 2) {
        std::cout << "USAGE: "
                  << argv[0]
                  << " <name>"
                  << std::endl;
        return 1;
    }
    std::cout << "Hello, "
              << argv[1]
              << "!" << std::endl;
    return 0;
}
```
]
.rc[
- `argc` --- **argument count**, including the program name
- `argv` --- an array of strings, one per argument
- `argv[0]` is always the program name
- User arguments start at `argv[1]`
- Returning non-zero (like `1`) signals an **error**
]
]

---

# Running the Program

```
$ ./greet Kurt
Hello, Kurt!

$ ./greet
USAGE: ./greet <name>
```

.callout[
**Trap:** **Always** validate `argc` before touching `argv[i]`. Reading past the end of `argv` is **undefined behavior** --- anything can happen.
]

---

# Putting It Together

.cols[
.lc[
```cpp
#include <iostream>
#include <string>

int main()
{
    std::string song;
    int year;

    std::cout << "Name a 90s song: ";
    std::getline(std::cin, song);

    std::cout << "What year? ";
    std::cin >> year;

    std::cout << song << " ("
              << year
              << ") es una cancion "
              << "increible!"
              << std::endl;
    return 0;
}
```
]
.rc[
Sample run:

```
Name a 90s song:
  Smells Like Teen Spirit
What year? 1991
Smells Like Teen Spirit (1991)
  es una cancion increible!
```

Notice we use `std::getline` for the song (multiple words) but `std::cin >> year` for the number.
]
]

# Quiz 1 --- What Does This Print?

.cols[
.lc[
```cpp
#include <iostream>
int main() {
    std::cout << "A" << "B"
              << std::endl;
    std::cout << "C" << std::endl;
    return 0;
}
```
]
.rc[
1. `A B C`
1. `AB` then `C` on a new line
1. `A` then `B` then `C`, each on their own line
1. `ABC` all on one line, no newline
1. Nothing --- it does not compile
]
]

???

Answer: **B**. Chained `<<` prints adjacent strings with no separator; `std::endl` starts a new line.

# Quiz 2 --- Where Is the Bug?

.cols[
.lc[
```cpp
1: #include <iostream>
2: int main()
3: {
4:     std::cout << "Here we are now"
                 << std::endl
5:     return 0;
6: }
```
]
.rc[
1. Line 1 --- wrong header
1. Line 2 --- `main` should return `void`
1. Line 4 --- missing semicolon
1. Line 5 --- cannot return `0`
1. Line 6 --- extra brace
]
]

???

Answer: **C**. Line 4 is missing a `;` after `std::endl`. `main` must return `int`, not `void`.

# Quiz 3 --- Counting `argv`

If `argc` is 4, how many arguments did the user actually type **after** the program name?

1. 0
1. 2
1. 3
1. 4
1. 5 --- Ben got this wrong

???

Answer: **C**. `argv[0]` is the program name, so `argc == 4` means three user-supplied arguments at `argv[1]`, `argv[2]`, `argv[3]`.

# Key Points to Reinforce

- Every program starts at `main()`
- Every statement ends with `;`
- `{}` define blocks --- they always pair up
- `#include <iostream>` is required for `std::cout` / `std::cin`
- `<<` writes, `>>` reads
- `std::` tells the compiler the name comes from the standard library
- `argc` / `argv` give you command-line arguments --- **validate before use**
- Always compile with `-Wall -Wextra -pedantic`
